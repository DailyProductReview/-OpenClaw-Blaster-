<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting to OpenClaw Blaster</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
        }
        .countdown {
            font-size: 48px;
            font-weight: bold;
            color: #ff9900;
            margin: 20px;
        }
        .button {
            display: inline-block;
            background-color: #ff9900;
            color: black;
            font-size: 24px;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>⏳ Redirecting to OpenClaw Blaster...</h1>
    <div class="countdown" id="countdown">3</div>
    <p>You will be redirected automatically.</p>
    
    <a href="https://warriorplus.com/o2/a/g7r106k/0" class="button">
        🔓 CLICK HERE NOW
    </a>

    <script>
        // Sanfter Countdown + Redirect (Chrome-freundlich)
        var seconds = 3;
        var countdownEl = document.getElementById('countdown');
        
        var interval = setInterval(function() {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(interval);
                // Diese Methode akzeptiert Chrome besser
                window.location.replace("https://warriorplus.com/o2/a/g7r106k/0");
            }
        }, 1000);
        
        // Backup: Wenn gar nichts geht
        setTimeout(function() {
            window.location.href = "https://warriorplus.com/o2/a/g7r106k/0";
        }, 4000);
    </script>
    
    <!-- Meta-Refresh als letztes Backup -->
    <noscript>
        <meta http-equiv="refresh" content="3;url=https://warriorplus.com/o2/a/g7r106k/0">
    </noscript>
</body>
</html>
