        /* shimmer button (same as before) */
        .shimmer-btn {

            box-shadow: 0 10px 0 #0f0f12, 0 15px 30px rgba(0, 0, 0, 0.8);

            cursor: pointer;
            position: relative;
            overflow: hidden;
            z-index: 1;
            margin: 2rem 0 1rem 0;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }

        .shimmer-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 248, 200, 0.5), rgba(255, 240, 160, 0.8), rgba(255, 248, 200, 0.5), transparent);
            transform: skewX(-25deg);
            transition: left 0.6s ease;
            z-index: 2;
            pointer-events: none;
        }

        .shimmer-btn:hover {
            background: linear-gradient(135deg, #353b4a, #262b37);
            color: #fff2b5;
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #0f0f12, 0 20px 35px black;
        }

        .shimmer-btn:hover::before {

        .shimmer-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #0f0f12, 0 15px 30px black;

        .shimmer-btn span {

        .email-form input[type="text"] {

            background: #1e222d;

        .email-form input[type="text"]:focus {

            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.3);
        }

        .email-form button {
            width: 100%;
            background: linear-gradient(145deg, #d4af37, #b68a2c);
            border: none;
            border-radius: 60px;
            padding: 1.2rem;

            text-transform: uppercase;
            color: #0a0c12;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 0 #6b4f1a, 0 10px 20px black;
            transition: 0.07s linear;
            margin-top: 0.5rem;
            border: 1px solid #efd57c;
        }

        .email-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #6b4f1a, 0 15px 25px black;
            background: linear-gradient(145deg, #e6c257, #c79f38);

        .email-form button:active {
            transform: translateY(5px);

        ::placeholder {

        .footer-note {

<body>
    <div class="container">
        <!-- rotator card - dynamic content changes per page load -->
        <div class="rotator-card" id="rotatorCard">
            <div class="rotator-headline" id="rotatorTitle"></div>
            <div class="rotator-line" id="rotatorLine1"></div>
            <div class="rotator-line" id="rotatorLine2"></div>

            <!-- big shimmer button that reveals email form -->
            <button class="shimmer-btn" id="showFormBtn"><span>🔥 UNLOCK NOW 🔥</span></button>
        </div>

        <!-- hidden email form with sendsteed code (appears after click) -->
        <div class="email-wrapper">
            <div class="email-form" id="emailForm">
                <form method="post" action="https://www.sendsteed.com/subscribe/">
                    <div class="form-group">
                        <input name="e123432" required type="text" placeholder="your@email.com">
                    </div>
                    <div class="form-group">

                    <!-- hidden fields with your values -->

                    <input type="hidden" name="lluid" value="sandyarta">

                    <!-- source = landingmix exactly as requested -->
                    <input type="hidden" name="source" value="landingmix">
                    <button type="submit">SUBMIT</button>
                </form>
                <div class="close-link">

    <script>
        (function() {
            // ----- ALL 5 ADS (exactly as before, no "line1" labels) -----
            const ads = [
                {
                    title: "Secret Money Method 2.0",
                    line1: "Forget 9-5. This glitch prints",
                    line2: "cash while you sleep. Rich or cry?"
                },
                {
                    title: "They Don't Want You Rich",
                    line1: "Your boss HATES this link.",
                    line2: "Stop being poor. Click for proof."
                },
                {
                    title: "Invite: Rich People Only",
                    line1: "This is not for the poor.",
                    line2: "Steal the wealth formula now."
                },
                {
                    title: "Lazy? Good. Get Paid.",
                    line1: "The lazier you are, the more",

                },
                {
                    title: "Capitalism is Broken.",
                    line1: "Exploit the system back.",
                    line2: "Take what’s yours. Start here."
                }
            ];

            // pick random ad on every page load
            const randomIndex = Math.floor(Math.random() * ads.length);
            const selected = ads[randomIndex];

            // update DOM
            document.getElementById('rotatorTitle').innerText = selected.title;
            document.getElementById('rotatorLine1').innerText = selected.line1;
            document.getElementById('rotatorLine2').innerText = selected.line2;

            // ----- form show/hide logic -----
            const showBtn = document.getElementById('showFormBtn');
            const emailForm = document.getElementById('emailForm');
            const hideLink = document.getElementById('hideFormLink');

            // show form when button clicked
            showBtn.addEventListener('click', function(e) {
                e.preventDefault();   // prevent any ghost navigation
                emailForm.classList.add('visible');
            });

            // hide form when "close" clicked
            hideLink.addEventListener('click', function(e) {
                e.preventDefault();
                emailForm.classList.remove('visible');
            });

            // optional: if you click outside? we keep it simple
        })();
    </script>
