<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Secret Rotation · Cash Breach</title>
    <style> 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0d10;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #e2e8f0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1f2b, #0a0c12 80%);
            z-index: -2;
        }

        .container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        .rotator-card {
            background: rgba(18, 22, 30, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 48px;
            padding: 3rem 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .rotator-headline {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.8rem;
            background: linear-gradient(145deg, #f5e9b2, #e5c97a, #cfb056);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .rotator-line {
            font-size: 1.8rem;
            line-height: 1.4;
            color: #cbd5e0;
            border-left: 4px solid #d4af37;
            padding-left: 1.2rem;
            margin: 1rem 0;
            text-align: left;
        }

        .shimmer-btn {
            width: 100%;
            background: linear-gradient(135deg, #2b2f3a, #1e212a);
            color: #fae7a3;
            font-weight: 700;
            font-size: 2rem;
            text-transform: uppercase;
            padding: 1.4rem 0;
            border-radius: 80px;
            border: none;
            box-shadow: 0 10px 0 #0f0f12;
            cursor: pointer;
            margin: 2rem 0 1rem;
            border: 1px solid rgba(212, 175, 55, 0.4);
            transition: 0.08s linear;
        }

        .shimmer-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #0f0f12;
        }

        .email-wrapper {
            max-width: 600px;
            margin: 1.5rem auto;
        }

        .email-form {
            background: rgba(10, 12, 18, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid #d4af37;
            border-radius: 60px;
            padding: 2rem;
            display: none;
        }

        .email-form.visible {
            display: block;
        }

        .email-form input[type="email"] {
            width: 100%;
            background: #1e222d;
            border: 1px solid #3f485c;
            border-radius: 60px;
            padding: 1.2rem 1.8rem;
            font-size: 1.2rem;
            color: #f0e9d0;
            margin-bottom: 1rem;
        }

        .email-form input[type="email"]:focus {
            border-color: #d4af37;
            outline: none;
        }

        .email-form button {
            width: 100%;
            background: linear-gradient(145deg, #d4af37, #b68a2c);
            border: none;
            border-radius: 60px;
            padding: 1.2rem;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #0a0c12;
            cursor: pointer;
        }

        .close-link {
            text-align: right;
            margin-top: 1rem;
        }

        .close-link a {
            color: #8f9bb3;
            cursor: pointer;
            text-decoration: none;
        }

        .close-link a:hover {
            color: #d4af37;
        }

        .footer-note {
            margin-top: 3rem;
            color: #4a5568;
            font-size: 0.8rem;
            text-align: center;
        }
        
        ::placeholder {
            color: #6f7a8f;
        }
    </style>
    
    <!-- ONESIGNAL SDK V16 - KORREKT -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "9a7e1c41-0031-4f0a-ba29-2407e2eaf957",
            });
            
            // DAS IST DIE RICHTIGE METHODE FÜR V16
            OneSignal.Notifications.requestPermission();
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="rotator-card">
            <div class="rotator-headline" id="rotatorTitle"></div>
            <div class="rotator-line" id="rotatorLine1"></div>
            <div class="rotator-line" id="rotatorLine2"></div>
            <button class="shimmer-btn" id="showFormBtn"><span>🔥 UNLOCK NOW 🔥</span></button>
        </div>

        <div class="email-wrapper">
            <div class="email-form" id="emailForm">
                <form method="post" action="https://www.sendsteed.com/subscribe/">
                    <input name="e123432" required type="email" placeholder="your@email.com">
                    <input type="hidden" name="lllid" value="123432">
                    <input type="hidden" name="lluid" value="sandyarta">
                    <input type="hidden" name="redirect" value="">
                    <input type="hidden" name="source" value="landingmix">
                    <button type="submit">SUBMIT</button>
                </form>
                <div class="close-link">
                    <a id="hideFormLink">✕ close</a>
                </div>
            </div>
        </div>

        <div class="footer-note">
            ⚠️ dark psychology · rotator · source=landingmix
        </div>
    </div>

    <script>
        const ads = [
            { title: "Secret Money Method 2.0", line1: "Forget 9-5. This glitch prints", line2: "cash while you sleep. Rich or cry?" },
            { title: "They Don't Want You Rich", line1: "Your boss HATES this link.", line2: "Stop being poor. Click for proof." },
            { title: "Invite: Rich People Only", line1: "This is not for the poor.", line2: "Steal the wealth formula now." },
            { title: "Lazy? Good. Get Paid.", line1: "The lazier you are, the more", line2: "you earn. Copy & paste riches." },
            { title: "Capitalism is Broken.", line1: "Exploit the system back.", line2: "Take what’s yours. Start here." }
        ];

        const randomIndex = Math.floor(Math.random() * ads.length);
        const selected = ads[randomIndex];

        document.getElementById('rotatorTitle').innerText = selected.title;
        document.getElementById('rotatorLine1').innerText = selected.line1;
        document.getElementById('rotatorLine2').innerText = selected.line2;

        const showBtn = document.getElementById('showFormBtn');
        const emailForm = document.getElementById('emailForm');
        const hideLink = document.getElementById('hideFormLink');
        const emailWrapper = document.querySelector('.email-wrapper');

        showBtn.addEventListener('click', function(e) {
            e.preventDefault();
            emailForm.classList.add('visible');
            emailWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        hideLink.addEventListener('click', function(e) {
            e.preventDefault();
            emailForm.classList.remove('visible');
        });
    </script>
</body>
</html>
